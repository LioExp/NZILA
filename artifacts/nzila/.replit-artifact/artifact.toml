kind = "web"
previewPath = "/"
title = "Nzila - Assistente Angolano"
version = "1.0.0"
id = "artifacts/nzila"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25228

[services.development]
run = "pnpm --filter @workspace/nzila run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nzila", "run", "build" ]
publicDir = "artifacts/nzila/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25228"
BASE_PATH = "/"
